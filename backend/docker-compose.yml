# =============================================================================
# docker-compose.yml — Orquestación de Fairgreen (Django + PostgreSQL)
# =============================================================================
# Uso:
#   Desarrollo: docker-compose up --build
#   Producción: crear un .env.docker con credenciales reales y ejecutar igual.

services:

  # ---------------------------------------------------------------------------
  # Base de datos PostgreSQL
  # ---------------------------------------------------------------------------
  db:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env.docker
    environment:
      - POSTGRES_DB=${DB_NAME:-fairgreen}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-your_db_password}
    ports:
      - "5435:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-fairgreen}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Aplicación Django (Gunicorn)
  # ---------------------------------------------------------------------------
  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    # Anulamos el ENTRYPOINT del Dockerfile para evitar problemas de CRLF en Windows
    entrypoint: []
    command: >
      sh -c "python manage.py makemigrations && python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - static_files:/app/staticfiles

volumes:
  postgres_data:
    driver: local
  static_files:
    driver: local
