# =============================================================================
# docker-compose.prod.yml — Orquestación de Producción para Fairgreen AWS
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Base de datos PostgreSQL + PostGIS (El cerebro de los mapas)
  # ---------------------------------------------------------------------------
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    restart: always # Mejor que unless-stopped para producción
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./.env.prod # Usaremos un archivo .env distinto para la nube
    ports:
      # OJO: Por seguridad, en producción no exponemos el puerto de la BD hacia internet (5435:5432). 
      # Solo dejamos que el backend se conecte por la red interna de Docker.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Aplicación Django (Backend API)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env.prod
    ports:
      - "127.0.0.1:8000:8000" # Se lo pasamos solo a Nginx (Localhost), no a internet abierto
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Eliminamos el volumen ./backend:/app porque en prod el código ya debe estar copiado dentro de la imagen
      - /var/www/fairgreen/static:/app/staticfiles

volumes:
  postgres_data:

